monitor.alsa.rules = [
  {
    matches = [
    # Starship/Matisse HD Audio Controller (Motherboard)
      {
        device.name = "alsa_card.pci-0000_09_00.4"
      },
    # AD103 High Definition Audio Controller (Monitor)
      {
	device.name = "alsa_card.pci-0000_07_00.1"
      }
    ]
    actions = {
      update-props = {
         device.disabled = true
      }
    }
  },
  
  {
    matches = [
    # FiiO K11 R2R Digital Stereo
      {
        device.product.name = "FiiO K11 R2R"
      },
    # Buildwin Media-Player Digital Stereo
      {
	device.product.name = "Buildwin Media-Player"
      }
    ]
    actions = {
      update-props = {
        "device.profile-set" = "analog-only.conf"
      }
    }
  }
]
